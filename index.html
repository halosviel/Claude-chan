<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude_chan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="title">Claude-chan</header>

  <!-- the desktop holds the app window(s) -->
  <main class="desktop">
    <!-- Claude-chan app -->
    <div class="window" id="win-app" data-task="task-claude">
      <div class="titlebar">
        <span class="win-title"><span class="ico nf"></span> Claude-chan</span>
        <span class="win-buttons">
          <button class="win-min" type="button" title="minimize">_</button>
          <button class="win-max" type="button" title="fullscreen">□</button>
          <button class="win-close" type="button" title="close">✕</button>
        </span>
      </div>

      <div class="win-body app-body">
        <div class="portrait-row">
          <div class="portrait-body">
            <img id="avatar" src="assets/emotions/happy/happy-1.png" alt="Claude-chan">
          </div>
          <div id="bubble" class="bubble hidden"></div>
        </div>

        <div class="input-section">
          <div class="subbar">
            <span class="subbar-label"><span class="ico nf">󰭻</span> input</span>
            <span class="char-count" id="char-count">0 characters</span>
            <label class="model-pick">
              <select id="model-select" title="chat model"></select>
            </label>
          </div>
          <div id="editor" class="md-editor" contenteditable="true" role="textbox"
               aria-multiline="true" data-placeholder="say something... (shift+enter for a new line)"></div>
          <p id="voice-note" class="voice-note hidden"></p>
        </div>
      </div>

      <span class="rh rh-nw"></span>
      <span class="rh rh-ne"></span>
      <span class="rh rh-sw"></span>
      <span class="rh rh-se"></span>
    </div>

    <!-- Terminal app (shows the debug logs); starts minimized -->
    <div class="window terminal-window" id="win-terminal" data-task="task-terminal" style="display:none">
      <div class="titlebar">
        <span class="win-title"><span class="ico nf"></span> terminal</span>
        <span class="win-buttons">
          <button class="win-min" type="button" title="minimize">_</button>
          <button class="win-max" type="button" title="fullscreen">□</button>
          <button class="win-close" type="button" title="close">✕</button>
        </span>
      </div>
      <div class="win-body term-body">
        <div class="term-log" id="term-log"></div>
      </div>
      <span class="rh rh-nw"></span>
      <span class="rh rh-ne"></span>
      <span class="rh rh-sw"></span>
      <span class="rh rh-se"></span>
    </div>

    <!-- Background selector app; starts minimized -->
    <div class="window bg-window" id="win-bg" data-task="task-bg" style="display:none">
      <div class="titlebar">
        <span class="win-title"><span class="ico nf"></span> Select background</span>
        <span class="win-buttons">
          <button class="win-min" type="button" title="minimize">_</button>
          <button class="win-max" type="button" title="fullscreen">□</button>
          <button class="win-close" type="button" title="close">✕</button>
        </span>
      </div>
      <div class="win-body bg-body">
        <h2 class="bg-heading">Select background</h2>
        <ul class="bg-list" id="bg-list"></ul>
      </div>
      <span class="rh rh-nw"></span>
      <span class="rh rh-ne"></span>
      <span class="rh rh-sw"></span>
      <span class="rh rh-se"></span>
    </div>

    <!-- Memory viewer; opened from the Start menu (content TBD) -->
    <div class="window memory-window" id="win-memory" data-task="task-memory" style="display:none">
      <div class="titlebar">
        <span class="win-title"><span class="ico nf">󰍛</span> Memory</span>
        <span class="win-buttons">
          <button class="win-min" type="button" title="minimize">_</button>
          <button class="win-max" type="button" title="fullscreen">□</button>
          <button class="win-close" type="button" title="close">✕</button>
        </span>
      </div>
      <div class="win-body memory-body">
        <h2 class="memory-heading">Memory</h2>
        <p class="memory-empty">Claude-chan's memories will live here.<br>(Nothing saved yet — coming soon.)</p>
      </div>
      <span class="rh rh-nw"></span>
      <span class="rh rh-ne"></span>
      <span class="rh rh-sw"></span>
      <span class="rh rh-se"></span>
    </div>
  </main>

  <!-- Windows-XP-like taskbar -->
  <div class="taskbar">
    <button class="start-btn" id="start-btn" type="button"><span class="ico nf">󰨡</span> start</button>
    <button class="task-app active" id="task-claude" data-window="win-app" type="button">
      <span class="ico nf"></span> Claude-chan
    </button>
    <button class="task-app" id="task-terminal" data-window="win-terminal" type="button">
      <span class="ico nf"></span> terminal
    </button>
    <button class="task-app" id="task-bg" data-window="win-bg" type="button">
      <span class="ico nf"></span> background
    </button>
    <span class="uptime" id="uptime"></span>
    <span class="clock" id="clock"></span>
  </div>

  <!-- Start menu (XP-style): a tall panel that pops up above the Start button -->
  <div class="start-menu" id="start-menu" style="display:none">
    <div class="start-menu-header"><span class="ico nf"></span> Claude-chan</div>
    <ul class="start-menu-list">
      <li><button class="start-item" id="start-memory" type="button"><span class="ico nf">󰍛</span> Memory</button></li>
    </ul>
    <div class="start-menu-footer">
      <button class="start-item" id="start-restart" type="button"><span class="ico nf"></span> Restart</button>
      <button class="start-item" id="start-poweroff" type="button"><span class="ico nf"></span> Power off</button>
    </div>
  </div>

  <!-- shown after Power off -->
  <div class="shutdown-screen" id="shutdown-screen" style="display:none">
    <p>It's now safe to turn off Claude-chan.</p>
  </div>

  <!-- permission prompt: a real draggable window (min/close = reject) -->
  <div class="window perm-window" id="perm-window" style="display:none">
    <div class="titlebar">
      <span class="win-title"><span class="ico">❓</span> Permission needed</span>
      <span class="win-buttons">
        <button class="win-min" type="button" title="minimize (reject)">_</button>
        <button class="win-max" type="button" title="fullscreen">□</button>
        <button class="win-close" type="button" title="close (reject)">✕</button>
      </span>
    </div>
    <div class="win-body perm-body">
      <p id="perm-text"></p>
      <div class="perm-buttons">
        <button id="perm-yes" type="button">Yes</button>
        <button id="perm-no" type="button">No</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
